name: Android CI/CD - Firebase Distribution

on:
  push:
    branches:
      - main # O la rama que uses para tus versiones de prueba

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java y Kotlin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Inyectar el archivo google-services.json en el pipeline
      # (Solo si lo añadiste al .gitignore. Si lo subiste al repo, puedes borrar este paso)
      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      # 4. Dar permisos de ejecución al wrapper de Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Compilar la aplicación en modo Release o Debug
      - name: Build APK
        run: ./gradlew assembleDebug

      # 6. Desplegar el APK generado a Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk --app ${{ secrets.FIREBASE_APP_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}