name: Android CI/CD - Firebase Distribution

on:
  push:
    branches:
      - master

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java 21 firmemente
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Forzar a Gradle a usar Java 21 mediante variables de entorno globales
      - name: Build APK with Java 21 Force
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -Xtest

      # 4. Desplegar el APK generado a Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk --app ${{ secrets.FIREBASE_APP_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}