# Committed defaults consumed by the Secrets Gradle Plugin.
# Real values must live in secrets.properties (gitignore). New developers and CI can
# build the project against these defaults; the app boots but third-party integrations
# that need a real key will be skipped at runtime by ApiKeyInterceptor.
# `unset` is a sentinel ApiKeyInterceptor treats as "no key configured" — it skips
# injection rather than sending a bogus credential. Override with a real value in
# secrets.properties. (The Secrets Gradle Plugin refuses to emit empty string values
# as BuildConfig fields, so a non-blank placeholder is required here.)
BACKEND_BASE_URL=https://api.softwork.elysium.example/
API_KEY_GEMINI=unset
API_KEY_GMAIL=unset
API_KEY_EXTERNAL_SERVICE=unset
